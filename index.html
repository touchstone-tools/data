<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fast ZIP Lookup + Excel Export</title>

<!-- ✅ Excel Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial;
    padding: 20px;
    background: #f5f7fb;
}
textarea {
    width: 400px;
    height: 120px;
    padding: 10px;
}
button {
    padding: 8px 12px;
    margin: 5px;
    cursor: pointer;
    border: none;
}
.search { background: #007bff; color: white; }
.download { background: #28a745; color: white; }

table {
    border-collapse: collapse;
    margin-top: 20px;
    width: 100%;
}
th, td {
    border: 1px solid #ccc;
    padding: 8px;
}
th {
    background: #007bff;
    color: white;
}

.status { font-weight: bold; }
</style>

</head>
<body>

<h2>⚡ Fast ZIP Lookup + Excel Export</h2>

<p id="status" class="status">⏳ Loading ZIP database...</p>

<textarea id="zipInput"
placeholder="Enter ZIPs (comma OR one per line)"></textarea>
<br>

<button class="search" onclick="searchZip()">Search</button>
<button class="download" onclick="downloadExcel()">Download Excel</button>

<table>
<thead>
<tr>
<th>ZIP</th>
<th>City</th>
<th>State</th>
<th>County</th>
<th>Area Codes</th>
</tr>
</thead>
<tbody id="resultBody"></tbody>
</table>

<script>

let zipMap = {};
let currentResults = [];
let jsonLoaded = false;

// ✅ LOAD JSON (FAST)
fetch('zipdata.json')
.then(res => res.json())
.then(data => {

    // ✅ Build map efficiently
    for (let i = 0; i < data.length; i++) {
        let item = data[i];
        let zipStr = String(item.zip);

        zipMap[zipStr] = item;
        zipMap[zipStr.padStart(5,'0')] = item;
    }

    jsonLoaded = true;

    document.getElementById("status").innerText =
        "✅ Loaded " + data.length + " records";

})
.catch(() => {
    document.getElementById("status").innerText =
        "⚠ Failed to load data";
});


// ✅ FAST SEARCH
function searchZip() {

    if (!jsonLoaded) {
        alert("Data not loaded yet!");
        return;
    }

    const input = document.getElementById("zipInput").value.trim();
    if (!input) return;

    const resultBody = document.getElementById("resultBody");

    const zips = input.split(/[\n,]+/);

    let html = "";       // ✅ buffer
    currentResults = [];

    for (let i = 0; i < zips.length; i++) {

        let cleanZip = zips[i].trim();
        if (!cleanZip) continue;

        let result =
            zipMap[cleanZip] ||
            zipMap[String(parseInt(cleanZip))] ||
            zipMap[String(cleanZip).padStart(5,'0')];

        if (result) {

            let row = {
                ZIP: cleanZip,
                City: result.primary_city,
                State: result.state,
                County: result.county,
                "Area Codes": result.area_codes
            };

            currentResults.push(row);

            html += `
            <tr>
                <td>${row.ZIP}</td>
                <td>${row.City}</td>
                <td>${row.State}</td>
                <td>${row.County || '-'}</td>
                <td>${row["Area Codes"]}</td>
            </tr>`;

        } else {

            html += `
            <tr>
                <td>${cleanZip}</td>
                <td colspan="4">No Record Found</td>
            </tr>`;
        }
    }

    // ✅ SINGLE UPDATE → VERY FAST
    resultBody.innerHTML = html;
}


// ✅ EXCEL DOWNLOAD
function downloadExcel() {

    if (currentResults.length === 0) {
        alert("No data to export!");
        return;
    }

    const ws = XLSX.utils.json_to_sheet(currentResults);
    const wb = XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(wb, ws, "ZIP Data");

    XLSX.writeFile(wb, "ZIP_Data.xlsx");
}

</script>

</body>
</html>
