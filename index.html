<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fast ZIP Lookup + Excel Export</title>

<!-- ✅ Excel Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
* {
    box-sizing: border-box;
}

/* ✅ Base */
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
}

/* ✅ TOPBAR (same as ViciDial page) */
.topbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 60px;
    background: #111827;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    z-index: 1000;
}

.topbar-title {
    color: #fff;
    font-weight: 600;
    font-size: 16px;
}

.nav-btn {
    background: #2563eb;
    color: #fff;
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    transition: 0.2s;
}

.nav-btn:hover {
    background: #1d4ed8;
}

/* ✅ Layout */
.wrapper {
    padding-top: 90px;
}

.container {
    max-width: 950px;
    margin: auto;
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* ✅ Title */
h2 {
    margin-top: 0;
    margin-bottom: 10px;
    color: #111827;
}

.subtitle {
    color: #6b7280;
    margin-bottom: 20px;
    font-size: 14px;
}

/* ✅ Status */
.status {
    font-weight: 600;
    margin-bottom: 10px;
}

/* ✅ Input */
textarea {
    width: 100%;
    height: 120px;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    margin-bottom: 15px;
    font-size: 14px;
}

textarea:focus {
    border-color: #2563eb;
    outline: none;
}

/* ✅ Buttons */
.actions {
    margin-bottom: 10px;
}

button {
    padding: 10px 16px;
    margin-right: 6px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: 0.2s;
}

.search {
    background: #2563eb;
    color: #fff;
}

.download {
    background: #16a34a;
    color: #fff;
}

button:hover {
    opacity: 0.9;
}

/* ✅ Table */
.table-wrapper {
    margin-top: 20px;
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
}

th {
    background: #2563eb;
    color: white;
    padding: 12px;
    text-align: left;
}

td {
    padding: 10px;
    border-bottom: 1px solid #e5e7eb;
}

tr:hover {
    background: #f1f5ff;
}

/* ✅ Watermark (same style as ViciDial) */
.watermark {
    position: fixed;
    bottom: 10px;
    right: 15px;
    font-size: 12px;
    background: rgba(255,255,255,0.9);
    padding: 6px 12px;
    border-radius: 20px;
    color: #6b7280;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.watermark strong {
    color: #111827;
}
</style>

</head>

<body>

<!-- ✅ TOPBAR -->
<div class="topbar">
    <div class="topbar-title">ZIP Lookup System</div>
    <a href="vicidial.html" class="nav-btn">⚙️ Filter Maker</a>
</div>

<div class="wrapper">

<div class="container">

<h2>⚡ Fast ZIP Lookup</h2>
<p class="subtitle">Search multiple ZIP codes instantly and export results to Excel.</p>

<p id="status" class="status">⏳ Loading ZIP database...</p>

<textarea id="zipInput"
placeholder="Enter ZIPs (comma, space, or one per line)"></textarea>

<div class="actions">
    <button class="search" onclick="searchZip()">Search</button>
    <button class="download" onclick="downloadExcel()">Download Excel</button>
</div>

<div class="table-wrapper">
<table>
<thead>
<tr>
<th>ZIP</th>
<th>City</th>
<th>State</th>
<th>County</th>
<th>Area Codes</th>
</tr>
</thead>
<tbody id="resultBody"></tbody>
</table>
</div>

</div>
</div>

<div class="watermark">
    Created by <strong>Nimo</strong>
</div>

<script>

let zipMap = {};
let currentResults = [];
let jsonLoaded = false;

// ✅ LOAD JSON
fetch('zipdata.json')
.then(res => res.json())
.then(data => {
    for (let i = 0; i < data.length; i++) {
        let item = data[i];
        let zipStr = String(item.zip);

        zipMap[zipStr] = item;
        zipMap[zipStr.padStart(5,'0')] = item;
    }

    jsonLoaded = true;

    document.getElementById("status").innerText =
        "✅ Loaded " + data.length + " records";
})
.catch(() => {
    document.getElementById("status").innerText =
        "⚠ Failed to load data";
});

// ✅ SEARCH
function searchZip() {

    if (!jsonLoaded) {
        alert("Data not loaded yet!");
        return;
    }

    const input = document.getElementById("zipInput").value.trim();
    if (!input) return;

    const resultBody = document.getElementById("resultBody");
    const zips = input.split(/[\n, ]+/);

    let html = "";
    currentResults = [];

    for (let i = 0; i < zips.length; i++) {

        let cleanZip = zips[i].trim();
        if (!cleanZip) continue;

        let result =
            zipMap[cleanZip] ||
            zipMap[String(parseInt(cleanZip))] ||
            zipMap[String(cleanZip).padStart(5,'0')];

        if (result) {

            let row = {
                ZIP: cleanZip,
                City: result.primary_city,
                State: result.state,
                County: result.county,
                "Area Codes": result.area_codes
            };

            currentResults.push(row);

            html += `
            <tr>
                <td>${row.ZIP}</td>
                <td>${row.City}</td>
                <td>${row.State}</td>
                <td>${row.County || '-'}</td>
                <td>${row["Area Codes"]}</td>
            </tr>`;
        } else {
            html += `
            <tr>
                <td>${cleanZip}</td>
                <td colspan="4">No Record Found</td>
            </tr>`;
        }
    }

    resultBody.innerHTML = html;
}

// ✅ EXCEL DOWNLOAD
function downloadExcel() {

    if (currentResults.length === 0) {
        alert("No data to export!");
        return;
    }

    const ws = XLSX.utils.json_to_sheet(currentResults);
    const wb = XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(wb, ws, "ZIP Data");

    XLSX.writeFile(wb, "ZIP_Data.xlsx");
}

</script>

</body>
</html>
