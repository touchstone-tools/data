<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fast ZIP Lookup</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #f4f6fb;
}

/* ✅ NAVBAR (COMMON) */
.navbar {
    height: 60px;
    background: #1f2937;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
}

.nav-title {
    color: #fff;
    font-weight: 600;
}

.nav-links a {
    color: #fff;
    text-decoration: none;
    margin-left: 10px;
    padding: 7px 12px;
    background: #2563eb;
    border-radius: 6px;
    font-size: 13px;
}

/* ✅ CONTAINER */
.wrapper { padding: 70px 20px; }

.card {
    max-width: 950px;
    margin: auto;
    background: #fff;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 5px 25px rgba(0,0,0,0.08);
}

h2 { margin-top: 0; }

/* INPUT */
textarea {
    width: 100%;
    height: 120px;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-bottom: 15px;
}

/* BUTTON */
button {
    padding: 10px 16px;
    border-radius: 6px;
    border: none;
    margin-right: 5px;
    cursor: pointer;
    font-weight: 600;
}

.search { background: #2563eb; color: #fff; }
.download { background: #16a34a; color: #fff; }

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th {
    background: #2563eb;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #eee;
}

/* WATERMARK */
.watermark {
    position: fixed;
    bottom: 10px;
    right: 15px;
    font-size: 12px;
    color: #999;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="nav-title">CRM Tools</div>
    <div class="nav-links">
        <a href="index.html">ZIP Lookup</a>
        <a href="vicidial.html">Filter Maker</a>
    </div>
</div>

<div class="wrapper">
<div class="card">

<h2>⚡ Fast ZIP Lookup + Excel Export</h2>

<p id="status">Loading data...</p>

<textarea id="zipInput" placeholder="Enter ZIPs..."></textarea>

<button class="search" onclick="searchZip()">Search</button>
<button class="download" onclick="downloadExcel()">Download</button>

<table>
<thead>
<tr>
<th>ZIP</th>
<th>City</th>
<th>State</th>
<th>County</th>
<th>Area Codes</th>
</tr>
</thead>
<tbody id="resultBody"></tbody>
</table>

</div>
</div>

<div class="watermark">Created by Nimo</div>

<script>
let zipMap={}, currentResults=[], jsonLoaded=false;

fetch('zipdata.json')
.then(r=>r.json())
.then(data=>{
    data.forEach(item=>{
        let z=String(item.zip);
        zipMap[z]=item;
        zipMap[z.padStart(5,'0')]=item;
    });
    jsonLoaded=true;
    status.innerText="Loaded "+data.length;
});

function searchZip(){
    let input=zipInput.value.trim();
    if(!input||!jsonLoaded) return;

    let zips=input.split(/[\n, ]+/);
    let html="";
    currentResults=[];

    zips.forEach(z=>{
        let r=zipMap[z]||zipMap[String(parseInt(z))]||zipMap[z.padStart(5,'0')];

        if(r){
            currentResults.push(r);
            html+=`<tr>
                <td>${z}</td>
                <td>${r.primary_city}</td>
                <td>${r.state}</td>
                <td>${r.county||'-'}</td>
                <td>${r.area_codes}</td>
            </tr>`;
        } else {
            html+=`<tr><td>${z}</td><td colspan="4">No Record</td></tr>`;
        }
    });

    resultBody.innerHTML=html;
}

function downloadExcel(){
    if(!currentResults.length) return alert("No data");
    let ws=XLSX.utils.json_to_sheet(currentResults);
    let wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Data");
    XLSX.writeFile(wb,"ZIP.xlsx");
}
</script>

</body>
</html>
