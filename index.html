<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fast ZIP Lookup</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

<div class="navbar">
    <div class="nav-title">CRM Tools</div>
    <div class="nav-links">
        <a href="index.html">ZIP Lookup</a>
        <a href="vicidial.html">Filter Maker</a>
    </div>
</div>

<div class="wrapper">
<div class="card">

<h2>⚡ Fast ZIP Lookup + Excel Export</h2>

<p id="status">Loading data...</p>

<textarea id="zipInput" placeholder="Enter ZIPs..."></textarea>

<button class="search" onclick="searchZip()">Search</button>
<button class="download" onclick="downloadExcel()">Download</button>

<table>
<thead>
<tr>
<th>ZIP</th>
<th>City</th>
<th>State</th>
<th>County</th>
<th>Area Codes</th>
</tr>
</thead>
<tbody id="resultBody"></tbody>
</table>

</div>
</div>

<div class="watermark">Created by Nimo</div>

<script>
let zipMap={}, currentResults=[], jsonLoaded=false;

fetch('zipdata.json')
.then(r=>r.json())
.then(data=>{
    data.forEach(item=>{
        let z=String(item.zip);
        zipMap[z]=item;
        zipMap[z.padStart(5,'0')]=item;
    });
    jsonLoaded=true;
    status.innerText="Loaded "+data.length;
});

function searchZip(){
    let input=zipInput.value.trim();
    if(!input||!jsonLoaded) return;

    let zips=input.split(/[\n, ]+/);
    let html="";
    currentResults=[];

    zips.forEach(z=>{
        let r=zipMap[z]||zipMap[String(parseInt(z))]||zipMap[z.padStart(5,'0')];

        if(r){
            currentResults.push(r);
            html+=`<tr>
                <td>${z}</td>
                <td>${r.primary_city}</td>
                <td>${r.state}</td>
                <td>${r.county||'-'}</td>
                <td>${r.area_codes}</td>
            </tr>`;
        } else {
            html+=`<tr><td>${z}</td><td colspan="4">No Record</td></tr>`;
        }
    });

    resultBody.innerHTML=html;
}

function downloadExcel(){
    if(!currentResults.length) return alert("No data");
    let ws=XLSX.utils.json_to_sheet(currentResults);
    let wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Data");
    XLSX.writeFile(wb,"ZIP.xlsx");
}
</script>

</body>
</html>
