<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViciDial Filter Maker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <div class="nav-title">ViciDial <span>Filter</span></div>
    <div class="nav-links">
        <a href="https://usdata.touchstone.workers.dev/">ZIP Lookup</a>
        <a href="vicidial.html" class="active">ViciDial Filter</a>
    </div>
</div>

<div class="wrapper">
    <div class="card">
        <h2>⚙️ ViciDial Filter Maker</h2>
        <span id="status">SQL Clause Query Engine</span>

        <textarea id="inputData" placeholder="Paste structural entries here (ZIPs, States, Phone variations, or Status tags)..."></textarea>

        <select id="type">
            <option value="postal_in">postal_code IN (...) → Matches multiple exact 5-digit ZIP codes</option>
            <option value="state_in">state IN (...) → Filters by an array of exact 2-letter State abbreviations</option>
            <option value="phone_like">phone_number LIKE '%...' → Wildcard match for specific Area Codes / Prefixes</option>
            <option value="status_in">status IN (...) → Targets leads matching specific Call Dispositions (e.g., NEW, A)</option>
        </select>

        <div class="btn-container">
            <button class="generate" onclick="gen()">Generate Clause</button>
            <button class="copy" onclick="copy()">Copy Output</button>
        </div>

        <div id="out" class="output">Generated multi-line system queries will render inside this console interface...</div>
    </div>
</div>

<div class="watermark">Created by Nimo</div>

<script>
function parse(v){
    return v
        .split(/[\n, ]+/)
        .map(x => x.trim())
        .filter(x => x);
}

function gen(){
    const val = parse(document.getElementById("inputData").value);
    const type = document.getElementById("type").value;
    const outputBox = document.getElementById("out");

    if(val.length === 0){
        outputBox.innerText = "⚠ System syntax prompt error: Please fill in target strings.";
        outputBox.style.color = "#f43f5e";
        return;
    }
    
    outputBox.style.color = "#38bdf8"; 

    const list = val.map(v => `'${v}'`).join(", ");
    let result = "";

    if(type === 'postal_in')
        result = `postal_code IN (${list})`;

    else if(type === 'state_in')
        result = `state IN (${list})`;

    else if(type === 'phone_like')
        result = val.map(v => `phone_number LIKE '${v}%'`).join(" OR ");

    else if(type === 'status_in')
        result = `status IN (${list})`;

    outputBox.innerText = result;
}

function copy(){
    const output = document.getElementById("out").innerText;

    if(!output || output.startsWith("Generated multi-line") || output.startsWith("⚠")){
        alert("No valid system SQL configurations prepared for deployment!");
        return;
    }

    navigator.clipboard.writeText(output).then(() => {
        alert("SQL command clause successfully written to your local clipboard memory!");
    }).catch(err => {
        alert("Clipboard write failed. Please manually select text block.");
    });
}
</script>

</body>
</html>
