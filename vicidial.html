<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ViciDial Filter Maker</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #f4f6fb;
}

/* SAME NAVBAR */
.navbar {
    height: 60px;
    background: #1f2937;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
}

.nav-title { color:#fff; font-weight:600; }

.nav-links a {
    color:#fff;
    text-decoration:none;
    margin-left:10px;
    padding:7px 12px;
    background:#2563eb;
    border-radius:6px;
    font-size:13px;
}

/* SAME CARD UI */
.wrapper { padding:70px 20px; }

.card {
    max-width:900px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 5px 25px rgba(0,0,0,0.08);
}

textarea {
    width:100%;
    height:140px;
    padding:12px;
    margin-bottom:15px;
}

select {
    width:100%;
    padding:10px;
    margin-bottom:15px;
}

button {
    padding:10px 14px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-right:5px;
}

.generate { background:#2563eb; color:#fff; }
.copy { background:#16a34a; color:#fff; }

.output {
    background:#111;
    color:#0f0;
    padding:15px;
    margin-top:15px;
}

/* SAME WATERMARK */
.watermark {
    position:fixed;
    bottom:10px;
    right:15px;
    font-size:12px;
    color:#999;
}
</style>
</head>

<body>

<!-- ✅ SAME NAVBAR -->
<div class="navbar">
    <div class="nav-title">CRM Tools</div>
    <div class="nav-links">
        <a href="index.html">ZIP Lookup</a>
        <a href="vicidial.html">Filter Maker</a>
    </div>
</div>

<div class="wrapper">
<div class="card">

<h2>⚙️ ViciDial Filter Maker</h2>

<textarea id="inputData" placeholder="Paste data..."></textarea>

<select id="type">
<option value="postal_in">postal_code IN</option>
<option value="state_in">state IN</option>
<option value="phone_like">phone_number LIKE</option>
<option value="status_in">status IN</option>
</select>

<button class="generate" onclick="gen()">Generate</button>
<button class="copy" onclick="copy()">Copy</button>

<div id="out" class="output"></div>

</div>
</div>

<div class="watermark">Created by Nimo</div>

<script>
function parse(v){
    return v.split(/[\n, ]+/).filter(x=>x);
}

function gen(){
    let val=parse(inputData.value);
    let type=document.getElementById("type").value;

    let list=val.map(v=>`'${v}'`).join(",");

    let out="";
    if(type==='postal_in') out=`postal_code IN (${list})`;
    if(type==='state_in') out=`state IN (${list})`;
    if(type==='phone_like') out=val.map(v=>`phone_number LIKE '${v}%'`).join(" OR ");
    if(type==='status_in') out=`status IN (${list})`;

    document.getElementById("out").innerText=out;
}

function copy(){
    navigator.clipboard.writeText(out.innerText);
    alert("Copied");
}
</script>

</body>
</html>
